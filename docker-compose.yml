services:
  db:
    image: postgis/postgis:16-3.5
    container_name: ilgi-postgis
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ilgi}
      POSTGRES_USER: ${POSTGRES_USER:-ilgi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ilgi_password}
      TZ: Asia/Seoul
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
